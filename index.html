<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindustry</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0a0a12; overflow: hidden; font-family: 'Courier New', monospace; }

    #loader {
      position: fixed; inset: 0; z-index: 9999;
      background: #0a0a12;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
      transition: opacity 0.6s ease;
    }
    #loader.fade-out { opacity: 0; pointer-events: none; }

    .logo     { font-size: 3rem; font-weight: 900; letter-spacing: 10px; color: #f0a030; text-shadow: 0 0 30px rgba(240,160,48,0.4); text-transform: uppercase; }
    .tagline  { font-size: 0.7rem; letter-spacing: 4px; color: #4a4a6a; text-transform: uppercase; }
    .bar-track{ width: 280px; height: 3px; background: #1a1a2e; border-radius: 2px; overflow: hidden; margin-top: 12px; }
    .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #c07820, #f0a030); border-radius: 2px; transition: width 0.35s ease; }
    .bar-fill.error { background: #c03030; transition: none; }
    .status   { font-size: 0.72rem; color: #6a6a8a; letter-spacing: 1px; min-height: 1.2em; }
    .hint     { font-size: 0.62rem; color: #333355; max-width: 280px; text-align: center; line-height: 1.6; margin-top: 6px; }

    #error-panel { display: none; background: #1a0a0a; border: 1px solid #5a1a1a; border-radius: 4px; padding: 16px 20px; max-width: 420px; width: 90%; margin-top: 8px; }
    #error-panel p    { font-size: 0.75rem; color: #cc4444; line-height: 1.7; }
    #error-panel code { display: block; margin-top: 8px; font-size: 0.68rem; color: #886666; word-break: break-all; }

    /* Debug log — visible on screen so we don't need DevTools */
    #log {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 99999;
      background: rgba(0,0,0,0.85); color: #8f8; font-size: 0.65rem;
      font-family: monospace; padding: 6px 10px;
      max-height: 30vh; overflow-y: auto;
      pointer-events: none;
    }
    #log div { white-space: pre-wrap; word-break: break-all; }

    #display { position: fixed; inset: 0; width: 100%; height: 100%; display: none; }
  </style>
</head>
<body>

  <div id="loader">
    <div class="logo">Mindustry</div>
    <div class="tagline">v157.4 &nbsp;·&nbsp; Web Port &nbsp;·&nbsp; Powered by CheerpX</div>
    <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
    <div class="status" id="status">Initializing…</div>
    <div class="hint" id="hint">
      First visit sets up the runtime (~150 MB total, one-time).<br>
      Your saves are stored <strong style="color:#5a5a7a">only in this browser</strong> — separate from every other player.
    </div>
    <div id="error-panel">
      <p id="error-text"></p>
      <code id="error-detail"></code>
    </div>
  </div>

  <canvas id="display"></canvas>
  <div id="log"></div>

  <script type="module">
    import * as CheerpX from 'https://cxrtnc.leaningtech.com/1.2.8/cx.esm.js';

    const bar       = document.getElementById('bar');
    const statusEl  = document.getElementById('status');
    const loader    = document.getElementById('loader');
    const errPanel  = document.getElementById('error-panel');
    const errText   = document.getElementById('error-text');
    const errDetail = document.getElementById('error-detail');
    const display   = document.getElementById('display');
    const logEl     = document.getElementById('log');

    function log(msg) {
      const line = document.createElement('div');
      line.textContent = msg;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setProgress(pct, msg) {
      bar.style.width = Math.max(0, Math.min(100, pct)) + '%';
      if (msg) { statusEl.textContent = msg; log('[init] ' + msg); }
    }

    function showError(msg, detail) {
      bar.classList.add('error');
      bar.style.width = '100%';
      statusEl.textContent = 'Failed to start';
      errText.textContent = msg;
      if (detail) errDetail.textContent = detail;
      errPanel.style.display = 'block';
      loader.classList.remove('fade-out');
      log('[error] ' + msg + (detail ? '\n' + detail : ''));
    }

    async function main() {
      try {
        setProgress(5, 'Connecting to Linux image…');
        const cloudDevice = await CheerpX.CloudDevice.create(
          'wss://disks.webvm.io/debian_large_20230522_5044875331_2.ext2'
        );

        setProgress(15, 'Setting up persistent storage…');
        const idbDevice     = await CheerpX.IDBDevice.create('mindustry-v157-r3');
        const overlayDevice = await CheerpX.OverlayDevice.create(cloudDevice, idbDevice);

        setProgress(20, 'Mounting app files…');
        const webDevice  = await CheerpX.WebDevice.create('');
        const dataDevice = await CheerpX.DataDevice.create();

        setProgress(30, 'Starting Linux…');
        const cx = await CheerpX.Linux.create({
          mounts: [
            { type: 'ext2', path: '/',    dev: overlayDevice },
            { type: 'dir',  path: '/app', dev: webDevice     },
            { type: 'dir',  path: '/data',dev: dataDevice    },
            { type: 'devs', path: '/dev'                     },
          ],
        });

        // Route Linux stdout/stderr to our on-screen log
        cx.setConsole(logEl);

        setProgress(50, 'Setting up display…');
        cx.setKmsCanvas(display, window.innerWidth, window.innerHeight);
        window.addEventListener('resize', () => {
          cx.setKmsCanvas(display, window.innerWidth, window.innerHeight);
        });

        setProgress(60, 'Starting Mindustry…');
        loader.classList.add('fade-out');
        display.style.display = 'block';

        // Debug: show what WebDevice exposes at /app
        log('[debug] listing /app ...');
        await cx.run('/bin/bash', ['-c', 'echo "==/app=="; ls /app; echo "==/app/jre=="; ls /app/jre 2>&1; echo "==/app/jre/bin=="; ls /app/jre/bin 2>&1'], {
          uid: 0, gid: 0,
          env: ['HOME=/root', 'PATH=/bin:/usr/bin'],
        });

        log('[run] chmod +x /app/jre/bin/java');
        await cx.run('/bin/bash', ['-c', 'chmod +x /app/jre/bin/java && echo "chmod ok"'], {
          uid: 0, gid: 0, env: ['HOME=/root', 'PATH=/bin:/usr/bin'],
        });

        log('[run] java -jar /app/Mindustry.jar');
        await cx.run('/app/jre/bin/java', [
          '-Djava.version=25.0.0',
          '-Djava.specification.version=25',
          '-Djava.vm.version=25.0.0',
          '-jar', '/app/Mindustry.jar',
        ], {
          env: [
            'HOME=/root',
            'USER=root',
            'SHELL=/bin/bash',
            'SDL_VIDEODRIVER=kmsdrm',
            'SDL_AUDIODRIVER=dummy',
            'JAVA_HOME=/app/jre',
            'LANG=en_US.UTF-8',
          ],
          uid: 0,
          gid: 0,
        });

        log('[done] process exited');

      } catch (err) {
        showError('CheerpX failed to start. Try Chrome or Edge.', String(err));
      }
    }

    main();
  </script>
</body>
</html>
