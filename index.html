<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindustry</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0a0a12; overflow: hidden; font-family: 'Courier New', monospace; color: #ddd; }

    #loader {
      position: fixed; inset: 0; z-index: 9999;
      background: #0a0a12;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
      transition: opacity 0.6s ease;
    }
    #loader.fade-out { opacity: 0; pointer-events: none; }

    .logo    { font-size: 3rem; font-weight: 900; letter-spacing: 10px; color: #f0a030; text-shadow: 0 0 30px rgba(240,160,48,0.4); text-transform: uppercase; }
    .tagline { font-size: 0.7rem; letter-spacing: 4px; color: #4a4a6a; text-transform: uppercase; }
    .credit  { font-size: 0.6rem; letter-spacing: 2px; color: #2a2a4a; }
    .status  { font-size: 0.72rem; color: #6a6a8a; letter-spacing: 1px; min-height: 1.2em; }
    .hint    { font-size: 0.62rem; color: #333355; max-width: 320px; text-align: center; line-height: 1.6; margin-top: 6px; }

    #log {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 99999;
      background: rgba(0,0,0,0.85); color: #8f8; font-size: 0.62rem;
      font-family: monospace; padding: 6px 10px;
      max-height: 25vh; overflow-y: auto; pointer-events: none;
    }
    #log div { white-space: pre-wrap; word-break: break-all; }

    #display { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }
  </style>
</head>
<body>

  <canvas id="display"></canvas>

  <div id="loader">
    <div class="logo">Mindustry</div>
    <div class="tagline">v157.4 &nbsp;·&nbsp; Web Port &nbsp;·&nbsp; CheerpJ + WebGL</div>
    <div class="credit">PORTED TO WEB BY CLAUDE (ANTHROPIC)</div>
    <div class="status" id="status">Initializing…</div>
    <div class="hint">
      Custom JavaScript implementation of Arc's SDL/WebGL native interface.<br>
      Saves stored only in this browser — separate from every other player.
    </div>
  </div>

  <div id="log"></div>

  <script type="module">
    import { mangleClass } from './natives/jni.js';
    import sdlNatives, { state, attachCanvas } from './natives/sdl.js';
    import sdlglNatives from './natives/sdlgl.js';

    const CHEERPJ_RUNTIME_VERSION = 17;
    const MINDUSTRY_CLASSPATH = '/app/Mindustry.jar:/app/dependencies.jar';
    const statusEl = document.getElementById('status');
    const loader   = document.getElementById('loader');
    const logEl    = document.getElementById('log');
    const display  = document.getElementById('display');

    function log(msg) {
      const line = document.createElement('div');
      line.textContent = msg;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }
    function setStatus(msg) { statusEl.textContent = msg; log('[init] ' + msg); }

    // Bridge Java's System.out/err so we see Mindustry's logging
    window.addEventListener('error', (e) => log('[error] ' + e.message));
    window.addEventListener('unhandledrejection', (e) => {
      log('[promise] ' + (e.reason?.message || e.reason || 'Unhandled rejection'));
    });

    // Clean up any leftover service workers from previous deployments
    // (CheerpX phase left a SW that interferes with CheerpJ's runtime fetches)
    async function killOldServiceWorkers() {
      if (!('serviceWorker' in navigator)) return;
      const regs = await navigator.serviceWorker.getRegistrations();
      if (regs.length === 0) return;
      log(`[cleanup] unregistering ${regs.length} old service worker(s)`);
      for (const r of regs) await r.unregister();
      const keys = await caches.keys();
      for (const k of keys) await caches.delete(k);
      log('[cleanup] caches cleared, reloading...');
      location.reload();
      await new Promise(() => {}); // halt
    }

    async function main() {
      try {
        await killOldServiceWorkers();
        setStatus('Sizing canvas…');
        display.width  = window.innerWidth;
        display.height = window.innerHeight;
        attachCanvas(display);

        setStatus(`Loading CheerpJ ${CHEERPJ_RUNTIME_VERSION} runtime…`);
        // CheerpJ 4 loader
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = 'https://cjrtnc.leaningtech.com/4.3/loader.js';
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        });

        setStatus('Combining native implementations…');
        const natives = { ...sdlNatives, ...sdlglNatives };
        log(`[natives] ${Object.keys(natives).length} JNI methods registered`);

        setStatus(`Initializing Java ${CHEERPJ_RUNTIME_VERSION} runtime…`);
        await cheerpjInit({
          // CheerpJ defaults to Java 8 if no runtime version is provided.
          version: CHEERPJ_RUNTIME_VERSION,
          status: 'none',
          natives,
          javaProperties: [
            'os.arch=amd64',
            'sun.arch.data.model=64',
            `java.version=${CHEERPJ_RUNTIME_VERSION}.0.0`,
            `java.specification.version=${CHEERPJ_RUNTIME_VERSION}`,
            `java.vm.version=${CHEERPJ_RUNTIME_VERSION}.0.0`,
            'org.lwjgl.system.allocator=system',
          ],
        });

        setStatus('Preparing Mindustry classpath…');
        const boot = await cheerpjRunLibrary(MINDUSTRY_CLASSPATH);
        const ArcNativesLoader = await boot.arc.util.ArcNativesLoader;
        const SharedLibraryLoader = await boot.arc.util.SharedLibraryLoader;

        // Arc's desktop bootstrap tries to extract native .so libraries.
        // We disable the broad "arc" loader and pre-mark the SDL bridge as
        // loaded so the Java side reaches our JS native implementations.
        ArcNativesLoader.disableNativesLoading = true;
        await SharedLibraryLoader.setLoaded('sdl-arc');
        log('[bootstrap] Arc desktop native autoload disabled');
        log('[bootstrap] sdl-arc marked as preloaded');

        setStatus('Starting Mindustry…');
        loader.classList.add('fade-out');

        // Run with the full classpath. Mindustry's release now ships a
        // separate dependencies.jar, so runJar() is not enough here.
        try {
          await cheerpjRunMain('mindustry.desktop.DesktopLauncher', MINDUSTRY_CLASSPATH);
        } catch (err) {
          loader.classList.remove('fade-out');
          setStatus('JVM exited: ' + err);
        }

      } catch (err) {
        setStatus('Failed: ' + (err.message || err));
        console.error(err);
      }
    }

    main();
  </script>
</body>
</html>
